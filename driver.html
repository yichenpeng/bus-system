<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>司機控制台</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; padding: 20px; max-width: 500px; margin: auto; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; font-size: 1.1rem; box-sizing: border-box; }
        button { background: #00b386; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #008860; }
        ul { padding-left: 20px; }
    </style>
</head>
<body>
    <h2>駕駛員控制台</h2>
    
    <label>選擇下一站：</label>
    <select id="stop-select">
        <option value="台北車站">台北車站</option>
        <option value="台大醫院">台大醫院</option>
        <option value="中正紀念堂">中正紀念堂</option>
        <option value="古亭站">古亭站</option>
    </select>
    <button onclick="updateStop()">更新下一站</button>

    <hr style="margin: 30px 0;">

    <!-- 動態新增站點介面 -->
    <h3>新增自訂站點</h3>
    <div class="station-input-group">
      <input type="text" id="stationName" placeholder="請輸入站名暱稱 (例如: 總統府站)">
      <input type="text" id="stationAddress" placeholder="請輸入真實地址 (例如: 台北市重慶南路一段122號)">
      <button id="addStationBtn" type="button">新增站點</button>
    </div>
    <ul id="stationList"></ul>

    <hr style="margin: 30px 0;">

    <label>更改跑馬燈宣導文字：</label>
    <input type="text" id="marquee-input" value="防疫期間，請留意自身健康狀況。">
    <button onclick="updateMarquee()">更新跑馬燈內容</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        // 儲存動態新增站點的陣列
        let stations = [];

        function updateStop() {
            const stop = document.getElementById('stop-select').value;
            socket.emit('update-bus-info', { nextStop: stop });
            alert('已更新下一站為：' + stop);
        }

        function updateMarquee() {
            const text = document.getElementById('marquee-input').value;
            socket.emit('update-bus-info', { marquee: text });
            alert('已更新跑馬燈宣導！');
        }

        // 更新畫面上的站點列表與下拉選單
        function updateStationUI() {
            const listEl = document.getElementById('stationList');
            const selectEl = document.getElementById('stop-select');
            
            listEl.innerHTML = '';
            selectEl.innerHTML = '';

            stations.forEach((station) => {
                // 更新清單顯示
                const li = document.createElement('li');
                li.textContent = `${station.name} (${station.address})`;
                listEl.appendChild(li);

                // 同步更新到「選擇下一站」的下拉選單中
                const option = document.createElement('option');
                option.value = station.name;
                option.textContent = station.name;
                selectEl.appendChild(option);
            });
        }

        // 新增站點按鈕事件
        document.getElementById('addStationBtn').addEventListener('click', async () => {
          const name = document.getElementById('stationName').value;
          const address = document.getElementById('stationAddress').value;
          
          if (!name || !address) {
            alert('請輸入站名與地址！');
            return;
          }

          try {
            // 透過免費的 Nominatim API 將地址轉為經緯度
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
            const data = await response.json();
            
            if (data && data.length > 0) {
              const lat = parseFloat(data[0].lat);
              const lon = parseFloat(data[0].lon);
              
              // 將資料推入站點陣列
              stations.push({ name: name, address: address, lat: lat, lon: lon });
              
              alert(`成功新增站點：${name} (${lat.toFixed(4)}, ${lon.toFixed(4)})`);
              updateStationUI(); // 更新畫面的站點列表與下拉選單

              // 清空輸入框
              document.getElementById('stationName').value = '';
              document.getElementById('stationAddress').value = '';
              
              // 同步透過 Socket 傳給伺服器/其他畫面
              socket.emit('update-stations', stations);
            } else {
              alert('找不到該地址，請檢查地址是否正確！');
            }
          } catch (error) {
            console.error('地址轉換失敗', error);
            alert('連線地圖伺服器失敗');
          }
        });
    </script>
</body>
</html>
