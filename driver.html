<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公車 LED 跑馬燈 - 駕駛員控制台</title>
    <style>
        .drag-handle { cursor: ns-resize; color: #888; font-size: 20px; padding: 0 5px; user-select: none; }
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .input-group, .announcement-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: #fafafa; padding: 15px; border-radius: 6px; border: 1px solid #eee; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        ul { list-style: none; padding: 0; width: 100%; }
        
        li { background: #fff; border: 1px solid #ddd; margin-bottom: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; transition: background-color 0.2s; box-sizing: border-box; }
        li.active-station { border: 2px solid #007bff; background-color: #e8f4fd; }

        li.sortable-ghost { opacity: 0.3; background: #e2e8f0; }
        li.sortable-chosen { background: #fff3cd; }
        li.sortable-drag {
            background: #ffffff !important;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            box-sizing: border-box !important;
            width: 100% !important;
            max-width: 560px !important; 
        }

        .station-info { font-size: 14px; color: #666; margin-top: 4px; }
        .actions button { background-color: #dc3545; margin-left: 5px; padding: 5px 10px; font-size: 14px; }
        .actions button:hover { background-color: #c82333; }
        .search-status { font-size: 12px; color: #007bff; margin-top: 5px; }
        .gps-panel { background: #e2f0d9; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #c8e1b7; }
        .announcement-panel { background: #fff3cd; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚌 駕駛員控制台 (進階導航與廣播版)</h2>
        
        <div class="gps-panel">
            <h3>📍 GPS 自動導航狀態</h3>
            <p id="gpsStatus">目前狀態：未開啟 GPS 追蹤</p>
            <button id="toggleGpsBtn" style="background-color: #17a2b8; width: 100%;">開啟 GPS 自動到站追蹤</button>
        </div>

        <!-- 🌟 新增：跑馬燈公告輸入區 -->
        <div class="announcement-panel">
            <h3>📢 跑馬燈多媒體廣播設定</h3>
            <div class="input-row">
                <input type="text" id="announcementInput" placeholder="輸入疫情、旅遊、政令宣導等跑馬燈內容...">
                <button id="addAnnouncementBtn" style="background-color: #ffc107; color: #333;">新增廣播</button>
            </div>
            <ul id="announcementList" style="margin-top: 10px;"></ul>
        </div>

        <div class="input-group">
            <div class="input-row">
                <input type="text" id="stationNickname" placeholder="跑馬燈顯示名稱（例如：總公司）">
                <input type="text" id="stationAddress" placeholder="真實地址/地標（例如：台北市信義路五段7號）">
            </div>
            <button id="addBtn">新增站點</button>
            <div id="searchStatus" class="search-status"></div>
        </div>

        <h3>站點清單</h3>
        <ul id="stationList"></ul>

        <button id="syncBtn" style="width: 100%; background-color: #007bff; margin-top: 15px;">手動同步更新至跑馬燈</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let stations = [];
        let announcements = []; // 儲存廣播訊息陣列
        let watchId = null;
        let currentActiveIndex = 0;

        // GPS 離站判定專用變數
        let hasEnteredStation = false; // 紀錄是否曾經進入過 < 500 公尺範圍
        let minDistanceRecorded = Infinity; // 紀錄在當前站點測得的最近距離

        const stationNickname = document.getElementById('stationNickname');
        const stationAddress = document.getElementById('stationAddress');
        const addBtn = document.getElementById('addBtn');
        const stationList = document.getElementById('stationList');
        const searchStatus = document.getElementById('searchStatus');
        const syncBtn = document.getElementById('syncBtn');
        const toggleGpsBtn = document.getElementById('toggleGpsBtn');
        const gpsStatus = document.getElementById('gpsStatus');

        const announcementInput = document.getElementById('announcementInput');
        const addAnnouncementBtn = document.getElementById('addAnnouncementBtn');
        const announcementList = document.getElementById('announcementList');

        // 初始化拖拉排序
        document.addEventListener('DOMContentLoaded', () => {
            Sortable.create(stationList, {
                animation: 150,
                handle: '.drag-handle',
                direction: 'vertical',
                forceFallback: true,
                fallbackAxis: 'y',
                onEnd: function (evt) {
                    const oldIndex = evt.oldIndex;
                    const newIndex = evt.newIndex;
                    if (oldIndex === newIndex) return;

                    const movedItem = stations.splice(oldIndex, 1)[0];
                    stations.splice(newIndex, 0, movedItem);

                    if (currentActiveIndex === oldIndex) {
                        currentActiveIndex = newIndex;
                    } else if (oldIndex < currentActiveIndex && newIndex >= currentActiveIndex) {
                        currentActiveIndex--;
                    } else if (oldIndex > currentActiveIndex && newIndex <= currentActiveIndex) {
                        currentActiveIndex++;
                    }

                    renderStations();
                    resetStationTracking(); // 重新排序後重置距離判定
                    autoSync();
                }
            });
        });

        // 新增公告/疫情資訊
        addAnnouncementBtn.addEventListener('click', () => {
            const text = announcementInput.value.trim();
            if (!text) {
                alert('請輸入廣播內容！');
                return;
            }
            announcements.push(text);
            announcementInput.value = '';
            renderAnnouncements();
            autoSync();
        });

        window.removeAnnouncement = function(index) {
            announcements.splice(index, 1);
            renderAnnouncements();
            autoSync();
        };

        function renderAnnouncements() {
            announcementList.innerHTML = '';
            announcements.forEach((item, index) => {
                const li = document.createElement('li');
                li.style.background = '#fff';
                li.style.padding = '5px 10px';
                li.style.fontSize = '14px';
                li.innerHTML = `
                    <span>📢 ${item}</span>
                    <button onclick="removeAnnouncement(${index})" style="background-color: #dc3545; padding: 2px 6px; font-size: 12px;">刪除</button>
                `;
                announcementList.appendChild(li);
            });
        }

        // 新增站點
        addBtn.addEventListener('click', async () => {
            const nickname = stationNickname.value.trim();
            const address = stationAddress.value.trim();

            if (!nickname || !address) {
                alert('請同時填寫名稱與真實地址！');
                return;
            }

            searchStatus.textContent = `正在查詢 "${address}" 的地理位置...`;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();

                if (!data || data.length === 0) {
                    searchStatus.textContent = `❌ 查無此地址的經緯度！`;
                    alert('查無此地址！');
                    return;
                }

                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                searchStatus.textContent = `✅ 成功找到地理位置！`;

                stations.push({ name: nickname, address: address, lat: lat, lon: lon });
                stationNickname.value = '';
                stationAddress.value = '';
                renderStations();
                autoSync();
            } catch (error) {
                searchStatus.textContent = `❌ 地圖服務連線失敗。`;
            }
        });

        function renderStations() {
            stationList.innerHTML = '';
            stations.forEach((station, index) => {
                const li = document.createElement('li');
                if (index === currentActiveIndex) {
                    li.classList.add('active-station');
                }
                li.dataset.index = index;
                const coordText = station.lat ? `座標: ${station.lat.toFixed(4)}, ${station.lon.toFixed(4)}` : '';
                
                li.innerHTML = `
                    <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                        <span class="drag-handle">☰</span>
                        <div style="flex: 1;">
                            <strong>${index + 1}. ${station.name}</strong> ${index === currentActiveIndex ? '⭐(目前所在站)' : ''}
                            <div class="station-info">${station.address} | ${coordText}</div>
                        </div>
                        <div class="actions">
                            <button onclick="removeStation(${index})">刪除</button>
                        </div>
                    </div>
                `;
                stationList.appendChild(li);
            });
        }

        window.removeStation = function(index) {
            stations.splice(index, 1);
            if (currentActiveIndex >= stations.length && stations.length > 0) {
                currentActiveIndex = stations.length - 1;
            }
            renderStations();
            resetStationTracking();
            autoSync();
        };

        toggleGpsBtn.addEventListener('click', () => {
            if (watchId === null) {
                if (!navigator.geolocation) {
                    alert('你的瀏覽器不支援地理定位功能！');
                    return;
                }
                if (stations.length === 0) {
                    alert('請先新增至少一個站點，才能開啟 GPS 自動導航！');
                    return;
                }

                gpsStatus.textContent = '目前狀態：GPS 追蹤中...';
                toggleGpsBtn.textContent = '關閉 GPS 自動追蹤';
                toggleGpsBtn.style.backgroundColor = '#dc3545';
                resetStationTracking();

                watchId = navigator.geolocation.watchPosition(
                    position => {
                        const driverLat = position.coords.latitude;
                        const driverLon = position.coords.longitude;
                        gpsStatus.textContent = `GPS 正常 (緯度: ${driverLat.toFixed(4)}, 經度: ${driverLon.toFixed(4)})`;
                        checkDistanceAndLogic(driverLat, driverLon);
                    },
                    error => { gpsStatus.textContent = `❌ GPS 取得失敗: ${error.message}`; },
                    { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
                );
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                gpsStatus.textContent = '目前狀態：已關閉 GPS 追蹤';
                toggleGpsBtn.textContent = '開啟 GPS 自動到站追蹤';
                toggleGpsBtn.style.backgroundColor = '#17a2b8';
            }
        });

        // 重置當前站點的進出站判定狀態
        function resetStationTracking() {
            hasEnteredStation = false;
            minDistanceRecorded = Infinity;
        }

        // 🌟 核心距離與進離站、提示詞邏輯判斷
        function checkDistanceAndLogic(lat1, lon1) {
            if (stations.length === 0) return;

            const currentStation = stations[currentActiveIndex];
            const dist = getDistanceFromLatLonInMeters(lat1, lon1, currentStation.lat, currentStation.lon);

            let prefix = "下一站: ";
            let isApproaching = false;

            if (dist < 500) {
                prefix = "即將到站: ";
                isApproaching = true;
                hasEnteredStation = true; // 標記已經進入過 <500公尺 範圍
                if (dist < minDistanceRecorded) {
                    minDistanceRecorded = dist; // 記錄最近距離
                }
            }

            // 離站判定：曾經小於500公尺，且目前距離比記錄到的最近距離多出 30 公尺以上（代表車子開走了、開始變遠）
            if (hasEnteredStation && dist > minDistanceRecorded + 30) {
                if (currentActiveIndex < stations.length - 1) {
                    currentActiveIndex++; // 自動跳到下一站
                    resetStationTracking();
                    renderStations();
                    console.log("已離站，自動切換至下一站索引:", currentActiveIndex);
                }
            }

            autoSync(prefix, isApproaching);
        }

        function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function deg2rad(deg) { return deg * (Math.PI / 180); }

        // 🌟 傳送完整狀態給伺服器（包含站點、目前索引、自訂廣播清單與當前字首前綴）
        function autoSync(prefix = "下一站: ", isApproaching = false) {
            socket.emit('update-stations', {
                stations: stations,
                currentIndex: currentActiveIndex,
                announcements: announcements,
                prefix: prefix,
                isApproaching: isApproaching
            });
        }

        syncBtn.addEventListener('click', () => {
            autoSync();
            alert('站點清單與公告已手動同步！');
        });
    </script>
</body>
</html>
