 <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公車 LED 跑馬燈 - 駕駛員控制台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: #fafafa; padding: 15px; border-radius: 6px; border: 1px solid #eee; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border: 1px solid #ddd; margin-bottom: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; }
        li.active-station { border: 2px solid #007bff; background-color: #e8f4fd; }
        .station-info { font-size: 14px; color: #666; margin-top: 4px; }
        .actions button { background-color: #dc3545; margin-left: 5px; padding: 5px 10px; font-size: 14px; }
        .actions button:hover { background-color: #c82333; }
        .search-status { font-size: 12px; color: #007bff; margin-top: 5px; }
        .gps-panel { background: #e2f0d9; padding: 15px; border-radius: 6px; margin-bottom: 15px; border: 1px solid #c8e1b7; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚌 駕駛員控制台 (GPS 自動導航版)</h2>
        
        <div class="gps-panel">
            <h3>📍 GPS 自動導航狀態</h3>
            <p id="gpsStatus">目前狀態：未開啟 GPS 追蹤</p>
            <button id="toggleGpsBtn" style="background-color: #17a2b8; width: 100%;">開啟 GPS 自動到站追蹤</button>
        </div>

        <div class="input-group">
            <div class="input-row">
                <input type="text" id="stationNickname" placeholder="跑馬燈顯示名稱（例如：總公司）">
                <input type="text" id="stationAddress" placeholder="真實地址/地標（例如：台北市信義路五段7號）">
            </div>
            <button id="addBtn">新增站點</button>
            <div id="searchStatus" class="search-status"></div>
        </div>

        <h3>站點清單</h3>
        <ul id="stationList"></ul>

        <button id="syncBtn" style="width: 100%; background-color: #007bff; margin-top: 15px;">手動同步更新至跑馬燈</button>
    </div>

    <!-- 引入 Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let stations = [];
        let watchId = null;
        let currentActiveIndex = 0;

        const stationNickname = document.getElementById('stationNickname');
        const stationAddress = document.getElementById('stationAddress');
        const addBtn = document.getElementById('addBtn');
        const stationList = document.getElementById('stationList');
        const searchStatus = document.getElementById('searchStatus');
        const syncBtn = document.getElementById('syncBtn');
        const toggleGpsBtn = document.getElementById('toggleGpsBtn');
        const gpsStatus = document.getElementById('gpsStatus');

        // 新增站點
        addBtn.addEventListener('click', async () => {
            const nickname = stationNickname.value.trim();
            const address = stationAddress.value.trim();

            if (!nickname || !address) {
                alert('請同時填寫名稱與真實地址！');
                return;
            }

            searchStatus.textContent = `正在查詢 "${address}" 的地理位置...`;

            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();

                if (!data || data.length === 0) {
                    searchStatus.textContent = `❌ 查無此地址的經緯度！`;
                    alert('查無此地址！');
                    return;
                }

                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                searchStatus.textContent = `✅ 成功找到地理位置！`;

                stations.push({ name: nickname, address: address, lat: lat, lon: lon });
                stationNickname.value = '';
                stationAddress.value = '';
                renderStations();
            } catch (error) {
                searchStatus.textContent = `❌ 地圖服務連線失敗。`;
            }
        });

       // 渲染介面（支援 HTML5 拖拉排序）
// 渲染介面
function renderStations() {
    stationList.innerHTML = '';
    stations.forEach((station, index) => {
        const li = document.createElement('li');
        if (index === currentActiveIndex) {
            li.classList.add('active-station');
        }
        li.dataset.index = index;

        const coordText = station.lat ? `座標: ${station.lat.toFixed(4)}, ${station.lon.toFixed(4)}` : '';
        
        li.innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px; width: 100%;">
                <span class="drag-handle" style="cursor: ns-resize; color: #888; font-size: 20px; padding: 0 5px;">☰</span>
                <div style="flex: 1;">
                    <strong>${index + 1}. ${station.name}</strong> ${index === currentActiveIndex ? '⭐(目前所在站)' : ''}
                    <div class="station-info">${station.address} | ${coordText}</div>
                </div>
                <div class="actions">
                    <button onclick="removeStation(${index})" style="background-color: #dc3545; padding: 5px 10px; font-size: 14px;">刪除</button>
                </div>
            </div>
        `;
        stationList.appendChild(li);
    });
}
window.removeStation = function(index) {
    stations.splice(index, 1);
    if (currentActiveIndex >= stations.length && stations.length > 0) {
        currentActiveIndex = stations.length - 1;
    }
    renderStations();
    autoSync();
};
        window.removeStation = function(index) {
            stations.splice(index, 1);
            renderStations();
        };

        // GPS 開關控制
        toggleGpsBtn.addEventListener('click', () => {
            if (watchId === null) {
                if (!navigator.geolocation) {
                    alert('你的瀏覽器不支援地理定位功能！');
                    return;
                }

                if (stations.length === 0) {
                    alert('請先新增至少一個站點，才能開啟 GPS 自動導航！');
                    return;
                }

                gpsStatus.textContent = '目前狀態：GPS 追蹤中（正在取得位置...）';
                toggleGpsBtn.textContent = '關閉 GPS 自動追蹤';
                toggleGpsBtn.style.backgroundColor = '#dc3545';

                // 開始監聽手機/電腦 GPS
                watchId = navigator.geolocation.watchPosition(
                    position => {
                        const driverLat = position.coords.latitude;
                        const driverLon = position.coords.longitude;
                        gpsStatus.textContent = `GPS 正常運作中 (緯度: ${driverLat.toFixed(4)}, 經度: ${driverLon.toFixed(4)})`;

                        checkDistance(driverLat, driverLon);
                    },
                    error => {
                        gpsStatus.textContent = `❌ GPS 取得失敗: ${error.message}`;
                    },
                    { enableHighAccuracy: true, maximumAge: 10000, timeout: 5000 }
                );
            } else {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
                gpsStatus.textContent = '目前狀態：已關閉 GPS 追蹤';
                toggleGpsBtn.textContent = '開啟 GPS 自動到站追蹤';
                toggleGpsBtn.style.backgroundColor = '#17a2b8';
            }
        });

        // 計算距離並自動切換站點（放寬限制以便室內測試）
function checkDistance(lat1, lon1) {
    if (stations.length === 0) return;

    let closestIndex = 0;
    let minDistance = Infinity;

    stations.forEach((station, index) => {
        const dist = getDistanceFromLatLonInMeters(lat1, lon1, station.lat, station.lon);
        if (dist < minDistance) {
            minDistance = dist;
            closestIndex = index;
        }
    });

    // 只要距離小於 500 公尺（適合室內 Wi-Fi 定位誤差），且換了新站就自動切換
    if (minDistance < 500 && currentActiveIndex !== closestIndex) {
        currentActiveIndex = closestIndex;
        renderStations();
        autoSync(); // 自動廣播給跑馬燈
        console.log(`自動切換至最近站點: ${stations[closestIndex].name} (距離: ${Math.round(minDistance)}公尺)`);
    }
}
        // 經緯度算距離（公尺）
        function getDistanceFromLatLonInMeters(lat1, lon1, lat2, lon2) {
            const R = 6371000; // 地球半徑 (公尺)
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * 
                Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function deg2rad(deg) {
            return deg * (Math.PI / 180);
        }

        // 自動同步至伺服器
        function autoSync() {
            socket.emit('update-stations', {
                stations: stations,
                currentIndex: currentActiveIndex
            });
        }

        // 手動同步按鈕
        syncBtn.addEventListener('click', () => {
            autoSync();
            alert('站點清單與目前進度已手動同步！');
        });
    </script>
</body>
</html>
