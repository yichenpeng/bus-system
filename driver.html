<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公車 LED 跑馬燈 - 駕駛員控制台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; background: #fafafa; padding: 15px; border-radius: 6px; border: 1px solid #eee; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; font-size: 16px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        ul { list-style: none; padding: 0; }
        li { background: #fff; border: 1px solid #ddd; margin-bottom: 8px; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 4px; cursor: grab; }
        li.dragging { opacity: 0.4; }
        .station-info { font-size: 14px; color: #666; margin-top: 4px; }
        .actions button { background-color: #dc3545; margin-left: 5px; padding: 5px 10px; font-size: 14px; }
        .actions button:hover { background-color: #c82333; }
        .search-status { font-size: 12px; color: #007bff; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚌 駕駛員控制台</h2>
        
        <div class="input-group">
            <div class="input-row">
                <input type="text" id="stationNickname" placeholder="跑馬燈顯示名稱（例如：總公司）">
                <input type="text" id="stationAddress" placeholder="真實地址/地標（例如：台北市信義路五段7號）">
            </div>
            <button id="addBtn">新增站點</button>
            <div id="searchStatus" class="search-status"></div>
        </div>

        <h3>站點清單（可拖曳排序）</h3>
        <ul id="stationList"></ul>

        <button id="syncBtn" style="width: 100%; background-color: #007bff; margin-top: 15px;">同步更新至跑馬燈</button>
    </div>

    <!-- 引入 Socket.io 用於即時通訊 -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let stations = [];

        const stationNickname = document.getElementById('stationNickname');
        const stationAddress = document.getElementById('stationAddress');
        const addBtn = document.getElementById('addBtn');
        const stationList = document.getElementById('stationList');
        const searchStatus = document.getElementById('searchStatus');
        const syncBtn = document.getElementById('syncBtn');

        // 點擊新增站點按鈕
        addBtn.addEventListener('click', async () => {
            const nickname = stationNickname.value.trim();
            const address = stationAddress.value.trim();

            if (!nickname || !address) {
                alert('請同時填寫「跑馬燈顯示名稱」與「真實地址」！');
                return;
            }

            searchStatus.textContent = `正在查詢 "${address}" 的地理位置...`;

            try {
                // 使用 OpenStreetMap Nominatim API 根據真實地址查詢經緯度
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`);
                const data = await response.json();

                if (!data || data.length === 0) {
                    searchStatus.textContent = `❌ 查無此地址的精確地理座標，請確認地址是否正確或重新輸入！`;
                    alert('查無此地址的經緯度，無法加入站點！');
                    return; // 終止執行，不加入陣列
                }

                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                searchStatus.textContent = `✅ 成功找到地理位置！`;

                // 將站點加入陣列
                stations.push({
                    name: nickname,
                    address: address,
                    lat: lat,
                    lon: lon
                });

                stationNickname.value = '';
                stationAddress.value = '';
                renderStations();

            } catch (error) {
                console.error('地理編碼查詢失敗:', error);
                searchStatus.textContent = `❌ 地圖服務連線失敗，請稍後再試。`;
                alert('地圖服務連線失敗，無法加入站點！');
            }
        });

        // 渲染站點介面
        function renderStations() {
            stationList.innerHTML = '';
            stations.forEach((station, index) => {
                const li = document.createElement('li');
                li.draggable = true;
                li.dataset.index = index;

                const coordText = station.lat ? `經緯度: ${station.lat.toFixed(4)}, ${station.lon.toFixed(4)}` : '無座標';
                
                li.innerHTML = `
                    <div>
                        <strong>${index + 1}. 顯示名稱：${station.name}</strong>
                        <div class="station-info">真實地址：${station.address} | ${coordText}</div>
                    </div>
                    <div class="actions">
                        <button onclick="removeStation(${index})">刪除</button>
                    </div>
                `;

                // 拖曳排序事件
                li.addEventListener('dragstart', () => li.classList.add('dragging'));
                li.addEventListener('dragend', () => li.classList.remove('dragging'));

                stationList.appendChild(li);
            });
        }

        // 刪除站點
        window.removeStation = function(index) {
            stations.splice(index, 1);
            renderStations();
        };

        // 拖曳排序核心邏輯
        stationList.addEventListener('dragover', e => {
            e.preventDefault();
            const draggingItem = document.querySelector('.dragging');
            const siblings = [...stationList.querySelectorAll('li:not(.dragging)')];
            
            const nextSibling = siblings.find(sibling => {
                const box = sibling.getBoundingClientRect();
                return e.clientY <= box.top + box.height / 2;
            });

            stationList.insertBefore(draggingItem, nextSibling);
        });

        stationList.addEventListener('drop', () => {
            const items = [...stationList.querySelectorAll('li')];
            stations = items.map(item => stations[item.dataset.index]);
            renderStations();
        });

        // 同步至後端與跑馬燈
        syncBtn.addEventListener('click', () => {
            socket.emit('update-stations', stations);
            alert('站點清單已成功同步！');
        });
    </script>
</body>
</html>
