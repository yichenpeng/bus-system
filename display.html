<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公車 LED 跑馬燈 - 顯示幕</title>
    <style>
        body { 
            background-color: #000; 
            color: #ff3300; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 40px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            height: 100vh; 
            box-sizing: border-box; 
        }
        .marquee-container { 
            background: #110000; 
            border: 4px solid #440000; 
            padding: 30px; 
            border-radius: 10px; 
            box-shadow: 0 0 20px rgba(255, 51, 0, 0.3); 
        }
        h1 { font-size: 28px; color: #ffaa00; margin-top: 0; text-transform: uppercase; border-bottom: 2px dashed #440000; padding-bottom: 10px; }
        .current-station { font-size: 64px; font-weight: bold; margin: 20px 0; text-shadow: 0 0 10px rgba(255, 51, 0, 0.7); }
        .next-station { font-size: 24px; color: #aa5500; }
        .station-list-preview { margin-top: 30px; font-size: 16px; color: #662200; }
    </style>
</head>
<body>

    <div class="container marquee-container">
        <h1>🚌 本次行駛路線與即時站點</h1>
        <div class="station-info">
            <div class="next-station" id="nextStationText">下一站：等待駕駛員同步資料...</div>
            <div class="current-station" id="currentStationText">---</div>
        </div>
        <div class="station-list-preview" id="previewText">完整站點：尚未載入</div>
    </div>

    <!-- 引入 Socket.io -->
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        const currentStationText = document.getElementById('currentStationText');
        const nextStationText = document.getElementById('nextStationText');
        const previewText = document.getElementById('previewText');

        // 接收來自後端的站點與進度更新
        socket.on('update-stations', (data) => {
            // 相容接收物件格式或舊的純陣列格式
            const stations = data.stations ? data.stations : data;
            const currentIndex = (data.currentIndex !== undefined) ? data.currentIndex : 0;

            if (!stations || stations.length === 0) {
                currentStationText.textContent = '---';
                nextStationText.textContent = '下一站：無站點資料';
                previewText.textContent = '完整站點：無';
                return;
            }

            // 顯示當前所在站
            const activeStation = stations[currentIndex] ? stations[currentIndex].name : '未知站點';
            currentStationText.textContent = `即將到站：${activeStation}`;

            // 顯示下一站
            if (currentIndex + 1 < stations.length) {
                nextStationText.textContent = `下一站：${stations[currentIndex + 1].name}`;
            } else {
                nextStationText.textContent = `已是最後一站`;
            }

            // 顯示所有站點的清單預覽（帶有目前所在站標記）
            const names = stations.map((s, idx) => idx === currentIndex ? `[${s.name}]` : s.name).join(' ➔ ');
            previewText.textContent = `完整路線：${names}`;
        });
    </script>
</body>
</html>
